<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Configurator</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Manrope:wght@200..800&display=swap"
        rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <section class="container-fluid config-container">
        <div class="row align-items-center">
            <div class="col-lg-6">
                <h2>Product Configurator</h2>
                <p>Please select the desired technical data for your application...</p>
            </div>

            <div class="col-lg-6 d-flex justify-content-end">
                <div class="message-con">
                    <span>@ Can't find what you are looking for? </span>
                    <strong>Please refer to our telephone support.</strong>
                </div>
            </div>
        </div>
        <div class="config-card-container mt-5">
            <div class="row main-config-container">
                <div class="col-lg-6 config-card-sub-container">
                    <div class="temp-control-con mb-2">
                        <div class="index-no ">
                            1
                        </div>
                        <h5 class="">TEMPERATURE CONTROL</h5>
                    </div>
                    <div class="temp-control-btns">
                        <button class="temp-btn">refrigerated</button>
                        <button class="whiteBtn">unrefrigerated</button>
                        <button class="whiteBtn" style="width: 211.33px;">refrigerated and heatable</button>
                        <button class="whiteBtn">heatable</button>
                    </div>
                </div>
                <div class="col-lg-6 config-card-sub-container">
                    <div class="temp-control-con mb-2">
                        <div class="index-no ">
                            2
                        </div>
                        <h5 class="">TUBE TYPE</h5>
                    </div>
                    <div class="temp-control-btns">
                        <button class="temp-btn">Plastics</button>
                        <button class="whiteBtn">Glass</button>
                        <button class="whiteBtn" style="width: 211.33px;">Stainless Steel</button>
                    </div>
                </div>

            </div>
        </div>
    </section>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
